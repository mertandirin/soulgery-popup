<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soulgery — Get the Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Open Sans", sans-serif;
      background: #E2ECF8;
      min-height: 100vh;
    }

    /* FAB — mobile first */
    .soulgery-fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      background: #2665F0;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 22px;
      font-family: "Open Sans", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(14, 58, 91, 0.3);
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .soulgery-fab:hover {
      background: #1a52c9;
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(14, 58, 91, 0.4);
    }

    .soulgery-fab:active {
      transform: scale(0.96);
    }

    /* Overlay */
    .soulgery-overlay {
      position: fixed;
      inset: 0;
      background: rgba(14, 58, 91, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      padding: 16px;
    }

    .soulgery-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* Modal — mobile first */
    .soulgery-modal {
      background: #fff;
      border-radius: 20px;
      max-width: 580px;
      width: 100%;
      padding: 32px 20px 24px;
      position: relative;
      box-shadow: 0 25px 60px rgba(14, 58, 91, 0.25);
      transform: translateY(20px) scale(0.95);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-height: 90vh;
      overflow-y: auto;
    }

    .soulgery-overlay.active .soulgery-modal {
      transform: translateY(0) scale(1);
    }

    .soulgery-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      font-size: 28px;
      color: #0E3A5B;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .soulgery-close:hover {
      color: #2665F0;
      background: #E2ECF8;
    }

    .soulgery-title {
      font-family: bookmania, Georgia, "Times New Roman", serif;
      color: #0E3A5B;
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 4px;
    }

    .soulgery-subtitle {
      color: #849172;
      font-size: 14px;
      text-align: center;
      margin-bottom: 20px;
    }

    /* Grid — mobile first: 1 column */
    .soulgery-platforms {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    /* Cards — mobile first: horizontal row */
    .soulgery-platform-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      background: #F7F9FC;
      border: 1.5px solid #E2ECF8;
      border-radius: 14px;
      padding: 14px 18px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }

    .soulgery-platform-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(14, 58, 91, 0.12);
      border-color: #2665F0;
    }

    .soulgery-platform-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .soulgery-platform-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .soulgery-platform-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .soulgery-platform-name {
      display: block;
      font-weight: 700;
      font-size: 14px;
      color: #0E3A5B;
      line-height: 1.3;
    }

    .soulgery-platform-format {
      display: block;
      font-size: 12px;
      color: #849172;
      line-height: 1.3;
    }

    /* Tablet: 2 columns, vertical cards */
    @media (min-width: 481px) {
      .soulgery-fab {
        bottom: 28px;
        right: 28px;
        padding: 16px 28px;
        font-size: 14px;
      }

      .soulgery-modal {
        padding: 40px 32px 32px;
      }

      .soulgery-title {
        font-size: 28px;
        margin-bottom: 6px;
      }

      .soulgery-subtitle {
        font-size: 15px;
        margin-bottom: 28px;
      }

      .soulgery-platforms {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .soulgery-platform-card {
        flex-direction: column;
        padding: 22px 16px 18px;
        gap: 8px;
        text-align: center;
      }

      .soulgery-platform-icon {
        width: 40px;
        height: 40px;
        margin-bottom: 2px;
      }

      .soulgery-platform-text {
        align-items: center;
      }
    }

    /* Desktop: 3 columns */
    @media (min-width: 641px) {
      .soulgery-modal {
        padding: 48px 40px 40px;
      }

      .soulgery-subtitle {
        margin-bottom: 32px;
      }

      .soulgery-platforms {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .soulgery-platform-icon {
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>
<body>

  <button class="soulgery-fab" id="soulgeryTrigger">GET THE BOOK</button>

  <div class="soulgery-overlay" id="soulgeryOverlay" role="dialog" aria-modal="true" aria-label="Get the book on your favorite platform">
    <div class="soulgery-modal">
      <button class="soulgery-close" id="soulgeryClose" aria-label="Close">&times;</button>
      <h2 class="soulgery-title">Get Your Copy</h2>
      <p class="soulgery-subtitle">Available on your favorite platform</p>
      <div class="soulgery-platforms">

        <a href="https://www.storytel.com/in/books/soulgery-a-lifelong-guide-to-unlocking-your-potential-12506798" class="soulgery-platform-card" target="_blank" rel="noopener" data-platform="Storytel">
          <div class="soulgery-platform-icon">
            <img src="logos/storytel.png" alt="Storytel">
          </div>
          <div class="soulgery-platform-text">
            <span class="soulgery-platform-name">Storytel</span>
            <span class="soulgery-platform-format">Audiobook</span>
          </div>
        </a>

        <a href="https://www.audible.in/pd/Soulgery-Audiobook/B0FTNJK8JQ" class="soulgery-platform-card" target="_blank" rel="noopener" data-platform="Audible">
          <div class="soulgery-platform-icon">
            <img src="logos/audible.png" alt="Audible">
          </div>
          <div class="soulgery-platform-text">
            <span class="soulgery-platform-name">Audible</span>
            <span class="soulgery-platform-format">Audiobook</span>
          </div>
        </a>

        <a href="https://www.everand.com/audiobook/923526246/Soulgery-A-Lifelong-Guide-to-Unlocking-Your-Potential" class="soulgery-platform-card" target="_blank" rel="noopener" data-platform="Everand">
          <div class="soulgery-platform-icon">
            <img src="logos/everand.png" alt="Everand">
          </div>
          <div class="soulgery-platform-text">
            <span class="soulgery-platform-name">Everand</span>
            <span class="soulgery-platform-format">Audiobook</span>
          </div>
        </a>

        <a href="https://www.amazon.com/Soulgery-Lifelong-Guide-Unlocking-Potential/dp/B0FF81HWH4" class="soulgery-platform-card" target="_blank" rel="noopener" data-platform="Amazon Books">
          <div class="soulgery-platform-icon">
            <img src="logos/amazon.png" alt="Amazon">
          </div>
          <div class="soulgery-platform-text">
            <span class="soulgery-platform-name">Amazon Books</span>
            <span class="soulgery-platform-format">Paperback & Kindle</span>
          </div>
        </a>

        <a href="https://www.kobo.com" class="soulgery-platform-card" target="_blank" rel="noopener" data-platform="Kobo">
          <div class="soulgery-platform-icon">
            <img src="logos/kobo.png" alt="Kobo">
          </div>
          <div class="soulgery-platform-text">
            <span class="soulgery-platform-name">Kobo</span>
            <span class="soulgery-platform-format">Audiobook</span>
          </div>
        </a>

        <a href="https://play.google.com/store/books" class="soulgery-platform-card" target="_blank" rel="noopener" data-platform="Google Play Books">
          <div class="soulgery-platform-icon">
            <img src="logos/googleplay.png" alt="Google Play Books">
          </div>
          <div class="soulgery-platform-text">
            <span class="soulgery-platform-name">Google Play Books</span>
            <span class="soulgery-platform-format">Audiobook</span>
          </div>
        </a>

      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('soulgeryOverlay');
    const trigger = document.getElementById('soulgeryTrigger');
    const closeBtn = document.getElementById('soulgeryClose');

    window.dataLayer = window.dataLayer || [];
    function pushEvent(name, params) {
      window.dataLayer.push(Object.assign({ event: name }, params || {}));
    }

    function openPopup(triggerType) {
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      pushEvent('soulgery_popup_open', { popup_trigger: triggerType || 'manual' });
    }

    function closePopup() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
      trigger.focus();
      pushEvent('soulgery_popup_close');
    }

    trigger.addEventListener('click', function() { openPopup('fab_button'); });
    closeBtn.addEventListener('click', closePopup);

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closePopup();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && overlay.classList.contains('active')) closePopup();
    });

    document.querySelectorAll('.soulgery-platform-card').forEach(function(card) {
      card.addEventListener('click', function() {
        pushEvent('soulgery_platform_click', {
          platform_name: card.getAttribute('data-platform'),
          platform_url: card.href
        });
      });
    });

    if (!sessionStorage.getItem('soulgery_popup_shown')) {
      setTimeout(function() {
        openPopup('auto');
        sessionStorage.setItem('soulgery_popup_shown', '1');
      }, 2000);
    }
  </script>
</body>
</html>
